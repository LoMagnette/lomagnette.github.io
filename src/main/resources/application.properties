site.url=https://lomagnette.github.io

%dev.site.draft=true
%dev.site.future=true

# Workaround: Deno 2.x DevScript race condition in web-bundler 2.2.1
# The DevWatcher triggers forceRestart during initial build, causing the Deno
# process to fail with "Module not found build.js". Disabling browser-live-reload
# uses production-style bundling in dev mode instead.
%dev.quarkus.web-bundler.browser-live-reload=false
