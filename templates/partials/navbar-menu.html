<header class="top-nav" role="banner">
    <div class="nav-container">
        <div class="nav-brand">
            <a href="/" class="brand-link">
                <span class="brand-name text-gradient">{cdi:siteConfig.name}</span>
            </a>
        </div>

        <nav class="nav-menu" role="navigation" aria-label="Main navigation">
            <ul class="nav-links">
                {#for item in cdi:siteConfig.menuItems}
                <li class="nav-item">
                    <a href="{item.path}"
                       class="nav-link {#if currentPath == item.path}active{#else if item.path != '/' && currentPath.startsWith(item.path)}active{/if}">
                        <i class="{item.icon}" aria-hidden="true"></i>
                        <span>{item.title}</span>
                    </a>
                </li>
                {/for}
            </ul>
        </nav>

        <div class="nav-social">
            {#for social in cdi:siteConfig.socials}
            <a href="{social.url}" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="{social.label}">
                <i class="{social.icon}"></i>
            </a>
            {/for}
        </div>

        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <i class="fa-solid fa-sun sun-icon"></i>
            <i class="fa-solid fa-moon moon-icon"></i>
        </button>

        <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>
